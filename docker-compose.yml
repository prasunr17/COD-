version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cod-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-cod_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-cod_mvp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cod_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cod-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Service
  fastapi:
    build:
      context: ./backend/fastapi-service
      dockerfile: Dockerfile
    container_name: cod-fastapi
    environment:
      DATABASE_URL: postgresql://${DB_USER:-cod_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-cod_mvp}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/fastapi-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Node.js Service
  nodejs:
    build:
      context: ./backend/node-service
      dockerfile: Dockerfile
    container_name: cod-nodejs
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-cod_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-cod_mvp}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      TRON_PRIVATE_KEY: ${TRON_PRIVATE_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/node-service:/app
      - /app/node_modules
    command: npm run dev

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cod-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - nodejs
      - fastapi
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: cod-network
